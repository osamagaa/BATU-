<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>العد التنازلي للتخرج | جامعة برج العرب التكنولوجية - الدفعة الأولى IT</title>
    <style>
        :root {
            --deep-navy: #051a2e;
            --navy: #0b2b4a;
            --mid-blue: #0f3b5f;
            --gold: #c8962e;
            --gold-light: #e0b854;
            --gold-pale: #f5e1a4;
            --gold-soft: #fdf3d1;
            --white-soft: #f8f6f0;
            --cream: #fef9ed;
            --dark-overlay: rgba(5, 22, 40, 0.88);
            --border-gold: rgba(200, 150, 46, 0.55);
            --glow-gold: rgba(224, 184, 84, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(160deg, #051a2e 0%, #0b2b4a 30%, #0f3b5f 60%, #0a2440 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', 'Segoe UI', 'Tajawal', system-ui, sans-serif;
            padding: 1.2rem;
            transition: background 0.7s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة بنمط النجوم */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1.5px 1.5px at 12% 18%, rgba(255, 215, 120, 0.7), transparent),
                radial-gradient(1px 1px at 25% 35%, rgba(255, 215, 120, 0.5), transparent),
                radial-gradient(1.2px 1.2px at 40% 12%, rgba(255, 215, 120, 0.6), transparent),
                radial-gradient(1.8px 1.8px at 55% 28%, rgba(255, 215, 120, 0.45), transparent),
                radial-gradient(1px 1px at 68% 8%, rgba(255, 215, 120, 0.55), transparent),
                radial-gradient(1.3px 1.3px at 78% 42%, rgba(255, 215, 120, 0.5), transparent),
                radial-gradient(1.6px 1.6px at 88% 20%, rgba(255, 215, 120, 0.4), transparent),
                radial-gradient(1px 1px at 15% 55%, rgba(255, 215, 120, 0.5), transparent),
                radial-gradient(1.4px 1.4px at 32% 68%, rgba(255, 215, 120, 0.45), transparent),
                radial-gradient(1.1px 1.1px at 50% 48%, rgba(255, 215, 120, 0.5), transparent),
                radial-gradient(1.7px 1.7px at 62% 72%, rgba(255, 215, 120, 0.4), transparent),
                radial-gradient(1px 1px at 75% 58%, rgba(255, 215, 120, 0.55), transparent),
                radial-gradient(1.3px 1.3px at 85% 75%, rgba(255, 215, 120, 0.4), transparent),
                radial-gradient(1.5px 1.5px at 92% 52%, rgba(255, 215, 120, 0.5), transparent);
            pointer-events: none;
            z-index: 0;
            animation: twinkle 3.5s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.55;
            }
            100% {
                opacity: 1;
            }
        }

        /* حالة الاحتفال */
        body.celebrate {
            background: radial-gradient(circle at 30% 15%, #f0c75e, #c8962e 45%, #8b5e1e 80%);
            animation: celebrateGlow 0.7s infinite alternate;
        }
        body.celebrate::before {
            background:
                radial-gradient(3px 3px at 10% 12%, #fffbe6, transparent),
                radial-gradient(2.5px 2.5px at 22% 30%, #ffffff, transparent),
                radial-gradient(2px 2px at 35% 8%, #fff9d6, transparent),
                radial-gradient(3.2px 3.2px at 48% 22%, #ffffff, transparent),
                radial-gradient(2.8px 2.8px at 55% 38%, #fffbe6, transparent),
                radial-gradient(2px 2px at 65% 15%, #ffffff, transparent),
                radial-gradient(3.5px 3.5px at 72% 28%, #fff9d6, transparent),
                radial-gradient(2.2px 2.2px at 80% 8%, #ffffff, transparent),
                radial-gradient(3px 3px at 88% 35%, #fffbe6, transparent),
                radial-gradient(2.5px 2.5px at 93% 18%, #ffffff, transparent),
                radial-gradient(2px 2px at 18% 55%, #fff9d6, transparent),
                radial-gradient(3px 3px at 28% 65%, #ffffff, transparent),
                radial-gradient(2.6px 2.6px at 42% 50%, #fffbe6, transparent),
                radial-gradient(3.3px 3.3px at 58% 60%, #ffffff, transparent),
                radial-gradient(2px 2px at 70% 52%, #fff9d6, transparent),
                radial-gradient(3px 3px at 82% 68%, #fffbe6, transparent);
            animation: sparkleCelebrate 0.4s infinite alternate;
            opacity: 1;
        }
        @keyframes celebrateGlow {
            0% {
                background: radial-gradient(circle at 30% 15%, #f0c75e, #c8962e 45%, #8b5e1e 80%);
            }
            100% {
                background: radial-gradient(circle at 70% 80%, #ffe08a, #d4a843 50%, #a07020 85%);
            }
        }
        @keyframes sparkleCelebrate {
            0% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }

        /* البطاقة الزجاجية */
        .glass-card {
            background: var(--dark-overlay);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.2rem;
            padding: 2rem 1.8rem 1.8rem;
            border: 1.5px solid var(--border-gold);
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(200, 150, 46, 0.25) inset,
                0 0 40px var(--glow-gold);
            text-align: center;
            max-width: 760px;
            width: 100%;
            position: relative;
            z-index: 1;
            transition: all 0.4s ease;
        }

        /* شريط علوي ذهبي */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
            border-radius: 0 0 50% 50%;
            box-shadow: 0 0 18px rgba(224, 184, 84, 0.7);
        }

        /* شعار الجامعة واسمها */
        .university-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.3rem;
            margin-top: 0.5rem;
        }
        .university-logo {
            font-size: 3.2rem;
            background: linear-gradient(145deg, #f5e1a4, #c8962e);
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow:
                0 0 0 4px #1a3d5c,
                0 0 0 7px rgba(200, 150, 46, 0.5),
                0 6px 18px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
        }
        .university-logo:hover {
            transform: scale(1.06);
        }
        .university-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #f5e1a4;
            line-height: 1.4;
            letter-spacing: -0.3px;
        }
        .university-name .en-sub {
            font-size: 0.85rem;
            display: block;
            color: #c8bfa0;
            font-weight: 500;
            letter-spacing: 1.2px;
            margin-top: 2px;
        }

        /* العنوان الرئيسي */
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(180deg, #fdf3d1 0%, #e0b854 50%, #c8962e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin: 0.6rem 0;
            letter-spacing: -0.5px;
            text-shadow: none;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.5));
        }

        /* شارة الدفعة الأولى */
        .first-batch-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, rgba(200, 150, 46, 0.3), rgba(200, 150, 46, 0.08));
            border: 1px solid rgba(200, 150, 46, 0.6);
            border-radius: 3rem;
            padding: 0.45rem 1.3rem;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: #f5e1a4;
            letter-spacing: 0.3px;
            backdrop-filter: blur(6px);
        }
        .first-batch-badge .star-icon {
            font-size: 1.3rem;
            animation: starPulse 1.8s ease-in-out infinite;
        }
        @keyframes starPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.35);
                opacity: 1;
            }
        }

        .sub {
            color: #e8d5a3;
            margin-bottom: 1.4rem;
            font-size: 1rem;
            font-weight: 500;
            border-bottom: 1px dashed rgba(200, 150, 46, 0.55);
            display: inline-block;
            padding-bottom: 0.4rem;
            letter-spacing: 0.2px;
        }

        /* ساعة رملية محسنة */
        .hourglass-wrapper {
            margin: 0 auto 1.2rem;
            width: 90px;
            height: 110px;
            position: relative;
        }
        .hourglass {
            width: 70px;
            height: 90px;
            margin: 0 auto;
            position: relative;
            animation: gentleFloat 3s ease-in-out infinite;
        }
        @keyframes gentleFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-7px);
            }
        }
        .hourglass-top,
        .hourglass-bottom {
            width: 0;
            height: 0;
            margin: 0 auto;
        }
        .hourglass-top {
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-bottom: 40px solid #e0b854;
            filter: drop-shadow(0 0 6px rgba(224, 184, 84, 0.6));
            animation: fillTop 3s ease-in-out infinite;
        }
        .hourglass-bottom {
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-top: 40px solid #c8962e;
            filter: drop-shadow(0 0 6px rgba(200, 150, 46, 0.5));
            animation: fillBottom 3s ease-in-out infinite;
            margin-top: 2px;
        }
        @keyframes fillTop {
            0%,
            100% {
                border-bottom-width: 40px;
                opacity: 0.9;
            }
            50% {
                border-bottom-width: 14px;
                opacity: 0.4;
            }
        }
        @keyframes fillBottom {
            0%,
            100% {
                border-top-width: 14px;
                opacity: 0.4;
            }
            50% {
                border-top-width: 40px;
                opacity: 0.9;
            }
        }
        .hourglass-connector {
            width: 8px;
            height: 10px;
            background: #c8962e;
            margin: 0 auto;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(200, 150, 46, 0.6);
        }

        /* العدادات */
        .timer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.4rem 0;
        }
        .time-unit {
            background: rgba(5, 22, 40, 0.7);
            border-radius: 1.3rem;
            padding: 0.9rem 1rem;
            min-width: 88px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(200, 150, 46, 0.5);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 215, 120, 0.15);
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .time-unit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), 0 0 18px rgba(200, 150, 46, 0.4), inset 0 1px 0 rgba(255, 215, 120, 0.2);
        }
        .time-number {
            font-size: 2.8rem;
            font-weight: 900;
            color: #fdf3d1;
            line-height: 1;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            font-family: 'Cairo', 'Segoe UI', monospace;
        }
        .time-label {
            font-size: 0.82rem;
            color: #d4c9a8;
            text-transform: uppercase;
            margin-top: 0.35rem;
            font-weight: 600;
            letter-spacing: 0.8px;
        }

        /* رسالة الحالة */
        .message {
            font-size: 1.15rem;
            margin: 1rem 0;
            padding: 0.9rem 1.2rem;
            background: rgba(5, 22, 40, 0.55);
            border-radius: 2.5rem;
            color: #f5e1a4;
            font-weight: 500;
            border: 1px solid rgba(200, 150, 46, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            letter-spacing: 0.1px;
            transition: all 0.4s;
        }

        /* رسالة الاحتفال */
        .celebrate-message {
            font-size: 2.6rem;
            font-weight: 900;
            animation: bounceCelebrate 0.9s infinite;
            margin: 1rem 0;
            color: #fffbe6;
            text-shadow: 0 0 20px #f59e0b, 0 0 40px #d97706, 0 0 60px rgba(245, 158, 11, 0.7);
            letter-spacing: -0.5px;
        }
        @keyframes bounceCelebrate {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-16px) scale(1.04);
            }
            60% {
                transform: translateY(-6px) scale(1.02);
            }
        }

        /* زر المشاركة */
        .btn-share {
            margin-top: 1.2rem;
            background: linear-gradient(135deg, #e0b854 0%, #c8962e 60%, #a8781e 100%);
            border: none;
            padding: 0.75rem 1.8rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1rem;
            color: #051a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            box-shadow: 0 6px 20px rgba(200, 150, 46, 0.35);
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }
        .btn-share:hover {
            transform: scale(1.04);
            background: linear-gradient(135deg, #f0c75e 0%, #d4a843 60%, #b88428 100%);
            box-shadow: 0 10px 28px rgba(200, 150, 46, 0.55);
        }
        .btn-share:active {
            transform: scale(0.96);
        }

        /* تذييل */
        footer {
            font-size: 0.9rem;
            margin-top: 1.6rem;
            color: #e0b854;
            font-weight: 600;
            border-top: 1px dashed rgba(200, 150, 46, 0.4);
            padding-top: 1rem;
            letter-spacing: 0.4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        footer .batch-tag {
            background: rgba(200, 150, 46, 0.2);
            padding: 0.25rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: #f5e1a4;
            border: 1px solid rgba(200, 150, 46, 0.5);
        }

        /* تجاوب */
        @media (max-width: 600px) {
            .glass-card {
                padding: 1.5rem 1rem 1.3rem;
                border-radius: 1.7rem;
            }
            .time-unit {
                min-width: 62px;
                padding: 0.55rem 0.5rem;
                border-radius: 1rem;
            }
            .time-number {
                font-size: 1.9rem;
                letter-spacing: 1px;
            }
            .time-label {
                font-size: 0.7rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .celebrate-message {
                font-size: 1.8rem;
            }
            .university-name {
                font-size: 1.25rem;
            }
            .university-name .en-sub {
                font-size: 0.7rem;
            }
            .university-logo {
                width: 58px;
                height: 58px;
                font-size: 2.4rem;
            }
            .first-batch-badge {
                font-size: 0.8rem;
                padding: 0.35rem 0.9rem;
            }
            .timer {
                gap: 0.5rem;
            }
            .btn-share {
                padding: 0.65rem 1.2rem;
                font-size: 0.9rem;
            }
        }
        @media (max-width: 380px) {
            .time-unit {
                min-width: 50px;
                padding: 0.4rem 0.35rem;
            }
            .time-number {
                font-size: 1.5rem;
            }
            .timer {
                gap: 0.35rem;
            }
            h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card" id="appCard">
        <!-- شعار واسم الجامعة -->
        <div class="university-header">
            <div class="university-logo" aria-hidden="true">🏛️</div>
            <div class="university-name">
                جامعة برج العرب التكنولوجية
                <span class="en-sub">BORG AL ARAB TECHNOLOGICAL UNIVERSITY</span>
            </div>
        </div>

        <!-- شارة الدفعة الأولى -->
        <div class="first-batch-badge">
            <span class="star-icon">⭐</span> الدفعة الأولى
            <span class="star-icon">⭐</span>
        </div>

        <!-- ساعة رملية -->
        <div class="hourglass-wrapper">
            <div class="hourglass">
                <div class="hourglass-top"></div>
                <div class="hourglass-connector"></div>
                <div class="hourglass-bottom"></div>
            </div>
        </div>

        <h1>🎓 العد التنازلي للتخرج 🎓</h1>
        <div class="sub">📅 15 يونيو 2026 – الساعة 10:00 صباحاً</div>

        <!-- العدادات -->
        <div class="timer" id="timerArea">
            <div class="time-unit">
                <div class="time-number" id="days">00</div>
                <div class="time-label">أيام</div>
            </div>
            <div class="time-unit">
                <div class="time-number" id="hours">00</div>
                <div class="time-label">ساعات</div>
            </div>
            <div class="time-unit">
                <div class="time-number" id="minutes">00</div>
                <div class="time-label">دقائق</div>
            </div>
            <div class="time-unit">
                <div class="time-number" id="seconds">00</div>
                <div class="time-label">ثواني</div>
            </div>
        </div>

        <!-- رسالة متغيرة -->
        <div class="message" id="statusMsg">
            💪 ٤ سنوات من الاجتهاد.. الدفعة الأولى على أعتاب المجد!
        </div>

        <!-- زر المشاركة -->
        <button class="btn-share" id="shareBtn">📱 شارك الفرحة مع زملائك</button>

        <!-- تذييل -->
        <footer>
            🎓 دفعة <span class="batch-tag">IT</span> | الدفعة الأولى 🎓
        </footer>
    </div>

    <script>
        // التاريخ المستهدف: 15 يونيو 2026، الساعة 10:00 صباحاً
        const targetDate = new Date(2026, 5, 15, 10, 0, 0);

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            const body = document.body;
            const timerArea = document.getElementById('timerArea');
            const statusMsgDiv = document.getElementById('statusMsg');
            const hourglassWrapper = document.querySelector('.hourglass-wrapper');
            const badge = document.querySelector('.first-batch-badge');

            // إذا انتهى العد التنازلي
            if (diff <= 0) {
                timerArea.style.display = 'none';
                if (badge) badge.style.display = 'none';
                statusMsgDiv.innerHTML = `
                    <div class="celebrate-message">🎉 مبروك التخرج! 🎉</div>
                    <p style="font-size:1.15rem; margin-top:0.6rem; color:#fffbe6; line-height:1.7;">
                        ⏳ انتهت رحلة الـ ٤ سنوات.. واليوم أنتم خريجو الدفعة الأولى من جامعة برج العرب التكنولوجية ❤️
                    </p>
                    <p style="font-size:1rem; color:#fdf3d1; margin-top:0.3rem;">
                        🎓🕊️ 15 يونيو 2026 – يوم النجاح والتكريم للدفعة الأولى IT 🕊️🎓
                    </p>
                `;
                body.classList.add('celebrate');
                if (hourglassWrapper) hourglassWrapper.style.opacity = '0.25';
                return;
            }

            // حساب الفروقات
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            // تحديث الأرقام
            document.getElementById('days').textContent = days < 10 ? '0' + days : days;
            document.getElementById('hours').textContent = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').textContent = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').textContent = seconds < 10 ? '0' + seconds : seconds;

            // تغيير الرسالة حسب المدة المتبقية
            if (days < 7) {
                statusMsgDiv.innerHTML = "🔥 الأيام الأخيرة.. الدفعة الأولى توشك أن تصنع التاريخ! 🔥";
            } else if (days < 30) {
                statusMsgDiv.innerHTML = "📅 أقل من شهر ونصبح خريجين.. استعدوا للحظة الوداع الجميل يا دفعة IT.";
            } else if (days < 100) {
                statusMsgDiv.innerHTML = "⏳ العد التنازلي بدأ فعلياً.. ٤ سنوات مرت كالحلم، وباقٍ القليل!";
            } else {
                statusMsgDiv.innerHTML = "💪 ٤ سنوات من الاجتهاد.. الدفعة الأولى على أعتاب المجد!";
            }

            // إزالة حالة الاحتفال
            body.classList.remove('celebrate');
            timerArea.style.display = 'flex';
            if (badge) badge.style.display = 'inline-flex';
            if (hourglassWrapper) hourglassWrapper.style.opacity = '1';
        }

        // تشغيل التحديث كل ثانية
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // زر المشاركة
        document.getElementById('shareBtn').addEventListener('click', () => {
            const daysText = document.getElementById('days').textContent;
            const shareText =
                `🎓 باقٍ ${daysText} يوم على تخرج الدفعة الأولى من جامعة برج العرب التكنولوجية (دفعة IT)! 🏛️\n` +
                `📅 15 يونيو 2026 – الساعة 10 صباحاً.\n` +
                `⭐ ٤ سنوات من الجهد.. واليوم نصنع التاريخ كأول دفعة تتخرج من الجامعة! ⭐`;

            if (navigator.share) {
                navigator.share({
                    title: 'العد التنازلي للتخرج - الدفعة الأولى IT | BATU',
                    text: shareText,
                    url: window.location.href,
                }).catch(() => {
                    // المستخدم ألغى المشاركة
                });
            } else {
                navigator.clipboard.writeText(shareText + '\n' + window.location.href).then(() => {
                    alert('📋 تم نسخ النص والرابط! يمكنك لصقه ومشاركته مع زملائك.');
                }).catch(() => {
                    alert('📋 نص المشاركة جاهز:\n\n' + shareText);
                });
            }
        });
    </script>
</body>
</html>
